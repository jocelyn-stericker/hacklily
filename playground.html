<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <link rel="shortcut icon" href="/favicon.ico" />
    <link rel="canonical" href="https://www.hacklily.org" />
    <meta
      name="description"
      content="Hacklily is an online LilyPond-based sheet-music editor and publishing tool."
    />
    <title>Hacklily &mdash; sheet music editor</title>
    <style type="text/css">
      /*
        NOTE: only styles needed for the inital render of Hacklily
        should be included here!

        Most styles should instead by managed by aphrodite and go in styles.tsx
      */
      body {
        margin: 0;
        padding: 0;
      }

      .App {
        bottom: 0;
        left: 0;
        overflow: hidden;
        position: absolute;
        right: 0;
        top: 0;
      }

      .content {
        background-color: #1e1e1e;
        height: calc(100% - 50px);
        position: absolute;
        width: 100%;
      }

      .monaco {
        height: 100%;
      }

      .header {
        background-color: #efefef;
        border-bottom: 1px solid black;
        display: flex;
        height: 50px;
        min-width: 321px;
        width: 100%;
      }

      .lilymonaco-inline-error {
        background-color: red;
        color: black !important;
      }

      button {
        background: none;
        border: none;
        cursor: pointer;
        padding: 0;
      }
    </style>
  </head>

  <body>
    <div id="root"></div>
    <script
      type="module"
      src="/src/makelily/satie/webapp/src/index.tsx"
    ></script>
  </body>
</html>
