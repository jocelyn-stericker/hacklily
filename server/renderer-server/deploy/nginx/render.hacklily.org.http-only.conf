# Temporary HTTP-only server for @@DOMAIN@@, used ONLY to obtain the
# initial Let's Encrypt certificate via `certbot --webroot`. install.sh
# installs this, runs certbot, then replaces it with the full config
# (render.hacklily.org.conf). Keep this minimal so there is nothing for
# certbot to conflict with.
server {
    listen 80;
    listen [::]:80;
    server_name @@DOMAIN@@;

    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 200 "@@DOMAIN@@ pending TLS setup; run install.sh to finish.\n";
    }
}