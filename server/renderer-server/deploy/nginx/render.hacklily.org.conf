# render.hacklily.org — TLS-terminating reverse proxy for the
# Hacklily render backend.
#
#   wss://render.hacklily.org/rpc  ->  ws://127.0.0.1:2000  (renderer_server)
#   everything else                ->  301 https://hacklily.org
#
# Installed by deploy/install.sh to /etc/nginx/conf.d/ (Fedora's
# nginx.conf includes conf.d/*.conf by default). The certificate is
# issued at install time by `certbot --webroot`; until it exists only
# the http-only variant (render.hacklily.org.http-only.conf) is
# installed so certbot can validate.
#
# @@DOMAIN@@ is substituted by install.sh (--domain, default
# render.hacklily.org).

# --- HTTP: ACME webroot challenge + redirect to HTTPS ---
server {
    listen 80;
    listen [::]:80;
    server_name @@DOMAIN@@;

    # Let's Encrypt webroot validation (certbot --webroot -w /var/www/html).
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# --- HTTPS: the service ---
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name @@DOMAIN@@;

    ssl_certificate     /etc/letsencrypt/live/@@DOMAIN@@/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/@@DOMAIN@@/privkey.pem;

    # Modern TLS, self-contained (no dependency on certbot-generated
    # include files that may not exist with `certbot certonly`).
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:render_ssl:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # The render backend WebSocket endpoint. `location =` is an exact
    # match, so /rpc?x=1 matches but /rpcfoo falls through to the
    # redirect below.
    location = /rpc {
        proxy_pass http://127.0.0.1:2000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket sessions are long-lived; nginx's default 60s read
        # timeout would close idle render sockets. 75s comfortably
        # exceeds the 8s render timeout and the worker ping interval.
        proxy_read_timeout 75s;
        proxy_send_timeout 75s;
    }

    # Everything else -> the SPA at hacklily.org.
    location / {
        return 301 https://hacklily.org$request_uri;
    }
}