on:
  push:
    branches:
      - main
jobs:
  build-site:
    runs-on: faith
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: npm ci
      - name: Build (runs tests via the build script)
        run: npm run build
      - name: Deploy to Grebedoc (www.hacklily.org)
        uses: actions/git-pages@v2
        with:
          site: https://www.hacklily.org
          source: ./dist
          server: grebedoc.dev
          password: ${{ secrets.GREBEDOC_PASSWORD }}
      - name: Deploy to Grebedoc (hacklily.org)
        uses: actions/git-pages@v2
        with:
          site: https://hacklily.org
          source: ./dist
          server: grebedoc.dev
          password: ${{ secrets.GREBEDOC_PASSWORD }}

  build-and-publish-server:
    runs-on: faith
    steps:
      - uses: actions/checkout@v5
      # -----------------------------------------------------------------
      # (1) Build the renderer Docker images. Tag them both with the
      #     local names the test suite looks up (hacklily-renderer /
      #     hacklily-renderer-unstable, see tests/util.rs) and with the
      #     Codeberg Container Registry tags we'll publish under.
      # -----------------------------------------------------------------
      - name: Build stable renderer
        run: |
          docker build --load \
            -t hacklily-renderer \
            -t codeberg.org/jocelyn-stericker/hacklily-renderer:latest \
            -t codeberg.org/jocelyn-stericker/hacklily-renderer:0.0.${{ github.run_number }} \
            server/renderer
          docker images | grep hacklily-renderer
      - name: Build unstable renderer
        run: |
          docker build --load \
            -t hacklily-renderer-unstable \
            -t codeberg.org/jocelyn-stericker/hacklily-renderer-unstable:latest \
            -t codeberg.org/jocelyn-stericker/hacklily-renderer-unstable:0.0.${{ github.run_number }} \
            server/renderer-unstable
          docker images | grep hacklily-renderer-unstable
      # -----------------------------------------------------------------
      # (2) Run the renderer-server test suite. The integration tests
      #     spawn containers from the images built above.
      # -----------------------------------------------------------------
      - name: Install Rust toolchain
        working-directory: server/renderer-server
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
      - name: Test renderer-server
        working-directory: server/renderer-server
        run: cargo test --locked
      # -----------------------------------------------------------------
      # (3) Publish: push the renderer images and the renderer-server
      #     crate. These only run if the tests passed.
      # -----------------------------------------------------------------
      - name: Login to Codeberg Container Registry
        run: echo "${{ secrets.CODEBERG_PACKAGES_TOKEN }}" | docker login codeberg.org -u jocelyn-stericker --password-stdin
      - name: Push stable renderer
        run: |
          docker push codeberg.org/jocelyn-stericker/hacklily-renderer:latest
          docker push codeberg.org/jocelyn-stericker/hacklily-renderer:0.0.${{ github.run_number }}
      - name: Push unstable renderer
        run: |
          docker push codeberg.org/jocelyn-stericker/hacklily-renderer-unstable:latest
          docker push codeberg.org/jocelyn-stericker/hacklily-renderer-unstable:0.0.${{ github.run_number }}
      - name: Configure Codeberg Cargo registry
        working-directory: server/renderer-server
        run: |
          mkdir -p ~/.cargo
          {
            printf '[registries.codeberg]\n'
            printf 'index = "https://codeberg.org/jocelyn-stericker/cargo.git"\n'
          } >> ~/.cargo/config.toml
      - name: Publish renderer-server to Codeberg Cargo registry
        working-directory: server/renderer-server
        env:
          CARGO_REGISTRIES_CODEBERG_TOKEN: ${{ secrets.CODEBERG_PACKAGES_TOKEN }}
        run: |
          # Bump the patch to a unique CI version so re-publishes succeed.
          sed -i -E 's/^version = "[0-9.]+"/version = "0.1.${{ github.run_number }}"/' Cargo.toml
          cargo publish --registry codeberg --allow-dirty
