on:
  push:
    branches:
      - main
jobs:
  build-site:
    runs-on: faith
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: npm ci
      - name: Build (runs tests via the build script)
        run: npm run build
      - name: Deploy to Grebedoc (www.hacklily.org)
        uses: actions/git-pages@v2
        with:
          site: https://www.hacklily.org
          source: ./dist
          server: grebedoc.dev
          password: ${{ secrets.GREBEDOC_PASSWORD }}
      - name: Deploy to Grebedoc (beta.hacklily.org)
        uses: actions/git-pages@v2
        with:
          site: https://beta.hacklily.org
          source: ./dist
          server: grebedoc.dev
          password: ${{ secrets.GREBEDOC_PASSWORD }}
