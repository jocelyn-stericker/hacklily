on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v5
      - name: Get npm cache directory
        id: npm-cache-dir
        shell: bash
        run: echo "dir=$(npm config get cache)" >> ${GITHUB_OUTPUT}
      - uses: actions/cache@v5
        id: npm-cache # use this to check for `cache-hit` ==> if: steps.npm-cache.outputs.cache-hit != 'true'
        with:
          path: ${{ steps.npm-cache-dir.outputs.dir }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-
      - name: Install deps
        run: npm ci
      - name: Lint and build
        run: |
          npm run lint
          npm run build
      - name: Deploy website (grebedoc)
        uses: actions/git-pages@v2
        with:
          site: https://jocelyn-stericker.grebedoc.dev/braat
          source: ./dist/client
          token: ${{ forge.token }}
      - name: Deploy website (codeberg)
        uses: actions/git-pages@v2
        with:
          site: https://jocelyn-stericker.codeberg.page/braat
          source: ./dist/client
          token: ${{ forge.token }}
