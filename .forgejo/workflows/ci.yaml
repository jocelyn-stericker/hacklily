on:
  push:
    branches:
      - main
jobs:
  deploy:
    runs-on: faith
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: npm ci
      - name: Lint
        run: |
          npm run lint
      - name: Test
        run: |
          npm run test
      - name: Build
        run: |
          npm run build
      - name: Deploy website
        uses: actions/git-pages@v2
        with:
          site: http://braat.app
          source: ./dist
          server: ipv6.braat.app
          password: ${{ secrets.GREBEDOC_PASSWORD }}
