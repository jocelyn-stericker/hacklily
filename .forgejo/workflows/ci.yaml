on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: npm ci
      - name: Lint and build
        run: |
          npm run lint
          npm run build
      - name: Deploy website (grebedoc)
        uses: actions/git-pages@v2
        with:
          site: https://jocelyn-stericker.grebedoc.dev/braat
          source: ./dist/client
          token: ${{ forge.token }}
      - name: Deploy website (codeberg)
        uses: actions/git-pages@v2
        with:
          site: https://jocelyn-stericker.codeberg.page/braat
          source: ./dist/client
          token: ${{ forge.token }}
