on:
  push:
    branches:
      - main
jobs:
  test:
    runs-on: codeberg-tiny
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        run: npm ci
      - name: Lint & Test
        run: |
          npm run lint & pid1=$!; npm run test & pid2=$!; wait $pid1; s1=$?; wait $pid2; s2=$?; [ $s1 -eq 0 ] && [ $s2 -eq 0 ]
      - name: Build
        run: |
          npm run build
      - name: Deploy website (grebedoc)
        uses: actions/git-pages@v2
        with:
          site: https://jocelyn-stericker.grebedoc.dev/braat
          source: ./dist/client
          token: ${{ forge.token }}
      - name: Deploy website (codeberg)
        uses: actions/git-pages@v2
        with:
          site: https://jocelyn-stericker.codeberg.page/braat
          source: ./dist/client
          token: ${{ forge.token }}
