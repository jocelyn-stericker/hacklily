on:
  push:
    tags:
      - "server-v*.*.*"
jobs:
  build-and-publish-server:
    runs-on: faith
    steps:
      - uses: actions/checkout@v5
      # -----------------------------------------------------------------
      # (1) Build the renderer Docker images. Tag them both with the
      #     local names the test suite looks up (hacklily-renderer /
      #     hacklily-renderer-unstable, see tests/util.rs) and with the
      #     Forgejo Container Registry tags we'll publish under.
      # -----------------------------------------------------------------
      - name: Build stable renderer
        run: |
          VERSION="${GITHUB_REF_NAME#server-v}"
          docker build --load \
            -t hacklily-renderer \
            -t slop.nettek.ca/jocelyn-stericker/hacklily-renderer:latest \
            -t slop.nettek.ca/jocelyn-stericker/hacklily-renderer:${VERSION} \
            server/renderer
          docker images | grep hacklily-renderer
      - name: Build unstable renderer
        run: |
          VERSION="${GITHUB_REF_NAME#server-v}"
          docker build --load \
            -t hacklily-renderer-unstable \
            -t slop.nettek.ca/jocelyn-stericker/hacklily-renderer-unstable:latest \
            -t slop.nettek.ca/jocelyn-stericker/hacklily-renderer-unstable:${VERSION} \
            server/renderer-unstable
          docker images | grep hacklily-renderer-unstable
      # -----------------------------------------------------------------
      # (2) Run the renderer-server test suite. The integration tests
      #     spawn containers from the images built above.
      # -----------------------------------------------------------------
      - name: Install Rust toolchain
        working-directory: server/renderer-server
        run: |
          if ! command -v cargo >/dev/null 2>&1; then
            curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y --profile minimal
            echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
          fi
      - name: Test renderer-server
        working-directory: server/renderer-server
        run: cargo test --locked -- --test-threads=1
      # -----------------------------------------------------------------
      # (3) Publish: push the renderer images and the renderer-server
      #     crate. These only run if the tests passed.
      # -----------------------------------------------------------------
      - name: Login to Forgejo Container Registry
        run: echo "${{ secrets.SLOP_PACKAGES_TOKEN }}" | docker login slop.nettek.ca -u jocelyn-stericker --password-stdin
      - name: Push stable renderer
        run: |
          docker push slop.nettek.ca/jocelyn-stericker/hacklily-renderer:latest
          docker push slop.nettek.ca/jocelyn-stericker/hacklily-renderer:${{ github.ref_name }}
      - name: Push unstable renderer
        run: |
          docker push slop.nettek.ca/jocelyn-stericker/hacklily-renderer-unstable:latest
          docker push slop.nettek.ca/jocelyn-stericker/hacklily-renderer-unstable:${{ github.ref_name }}
      - name: Configure Forgejo Cargo registry
        working-directory: server/renderer-server
        run: |
          mkdir -p ~/.cargo
          {
            printf '[registries.forgejo]\n'
            printf 'index = "sparse+https://slop.nettek.ca/api/packages/jocelyn-stericker/cargo/"\n'
          } >> ~/.cargo/config.toml
      - name: Publish renderer-server to Forgejo Cargo registry
        working-directory: server/renderer-server
        env:
          CARGO_REGISTRIES_FORGEJO_TOKEN: "Bearer ${{ secrets.SLOP_PACKAGES_TOKEN }}"
        run: |
          VERSION="${GITHUB_REF_NAME#server-v}"
          sed -i -E "s/^version = \"[0-9.]+\"/version = \"${VERSION}\"/" Cargo.toml
          cargo publish --registry forgejo --allow-dirty
