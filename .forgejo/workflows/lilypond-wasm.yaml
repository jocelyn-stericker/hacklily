on:
  push:
    tags:
      - "wasm-v*.*.*"
jobs:
  build-and-publish-wasm:
    runs-on: faith
    steps:
      - uses: actions/checkout@v5
      - name: Install deps
        working-directory: ./lilypond-wasm
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential \
            pkg-config \
            curl \
            git \
            python3 \
            python3-packaging \
            gperf \
            bison \
            flex \
            gettext \
            libffi-dev \
            libfl-dev \
            libgc-dev \
            libgmp-dev \
            libunistring-dev \
            meson \
            ninja-build \
            fontforge-nox \
            t1utils \
            texlive-binaries \
            texlive-metapost \
            texlive-latex-base \
            libpango1.0-dev \
            libcairo2-dev \
            libglib2.0-dev \
            nodejs \
            npm
          rm -rf /var/lib/apt/lists/*
      - name: Install playwright (headless-Chromium render tests)
        working-directory: ./lilypond-wasm/
        run: |
          npm install playwright
          # --with-deps needs sudo for system libs; if the runner image
          # already has them, plain `install chromium` suffices.
          npx playwright install --with-deps chromium
      - name: Build and test
        working-directory: ./lilypond-wasm
        run: |
          # Downloads all sources sha256-pinned (incl. emsdk), builds the
          # whole stack, and runs the node + browser render tests —
          # including the warm-instance test (lily-warm.html).  Fails if
          # any render test fails.
          ./bootstrap.sh --browser
      - name: Publish to Forgejo npm registry
        env:
          NPM_TOKEN: ${{ secrets.SLOP_PACKAGES_TOKEN }}
        working-directory: ./lilypond-wasm/dist
        run: |
          VERSION="${GITHUB_REF_NAME#wasm-v}"
          npm version "2.27.1-build.$VERSION" --no-git-tag-version
          npm config set @jocelyn-stericker:registry https://slop.nettek.ca/api/packages/jocelyn-stericker/npm/
          npm config set -- '//slop.nettek.ca/api/packages/jocelyn-stericker/npm/:_authToken' "${NPM_TOKEN}"
          npm publish --tag=alpha
